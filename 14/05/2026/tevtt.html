<!DOCTYPE html>

<meta charset="UTF-8">
<title>ParkWatch · Center Shopping UDI</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:#0a0a0a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:'Courier New',monospace;
  }

  #scene{
    position:relative;
    width:100%;
    max-width:1266px;
    padding-bottom:50.079%;
  }

  #scene svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }

  #bar-ctrl{
    width:100%;
    max-width:1266px;
    background:rgba(0,0,0,.92);
    border-top:1px solid rgba(0,255,60,.08);
    padding:6px 16px;
    display:flex;
    align-items:center;
    gap:12px;
  }

  #bar-ctrl button{
    background:transparent;
    border:1px solid #003300;
    color:#00aa33;
    padding:4px 14px;
    cursor:pointer;
    font-family:'Courier New',monospace;
    font-size:10px;
    letter-spacing:1px;
    transition:all .2s;
  }

  #bar-ctrl button:hover,
  #bar-ctrl button.on{
    background:rgba(0,255,60,.1);
    border-color:#00ff44;
    color:#00ff44;
  }

  #bar-ctrl .ver{
    margin-left:auto;
    font-size:9px;
    color:rgba(0,255,60,.18);
    letter-spacing:1px;
  }

  #minimap{
    position:fixed;
    right:12px;
    bottom:12px;
    width:220px;
    aspect-ratio:853 / 1536;
    border:1px solid rgba(255,255,255,.12);
    overflow:hidden;
    background:#d8d2bf;
    z-index:20;
    pointer-events:none;
  }

  #minimap svg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }

        <feGaussianBlur stdDeviation="2.5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <image href="shopp.jpeg" x="0" y="0" width="1266" height="634"

</div>

const MINI_VIAS = [
  [{x:492,y:970},{x:430,y:960},{x:365,y:948},{x:300,y:935},{x:249,y:936}],
  [{x:493,y:889},{x:430,y:880},{x:360,y:868},{x:263,y:887}],

  [{x:477,y:615},{x:400,y:610},{x:320,y:608},{x:240,y:616}],
  [{x:476,y:532},{x:396,y:530},{x:315,y:532},{x:231,y:536}],

function buildPath(viaIdx) {
  if (viaIdx < 0) return [...ENTRY, ...LOWER.slice(1)];
  return [
    ...UPPER.slice(0, VIA_ENTRY[viaIdx] + 1),
    ...VIAS[viaIdx].slice(1),
    ...LOWER.slice(VIA_EXIT[viaIdx] + 1)
  ];
}

function perspScale(y) {
  const t = Math.max(0, Math.min(1, (y - 230) / (510 - 230)));
  return 0.42 + 0.50 * t;
}

function ptDist(a, b) {
  return Math.hypot(b.x - a.x, b.y - a.y);
}

function polyLen(pts) {
  let total = 0;
  for (let i = 0; i < pts.length - 1; i++) total += ptDist(pts[i], pts[i + 1]);
  return total;
}

function pointAtFraction(pts, t) {
  if (!pts.length) return {x:0, y:0};
  if (pts.length === 1) return {x:pts[0].x, y:pts[0].y};

  t = Math.max(0, Math.min(1, t));
  const total = polyLen(pts) || 0.001;
  const target = total * t;

  let acc = 0;
  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    const seg = ptDist(a, b) || 0.001;
    if (acc + seg >= target) {
      const u = (target - acc) / seg;
      return {
        x: a.x + (b.x - a.x) * u,
        y: a.y + (b.y - a.y) * u
      };
    }
    acc += seg;
  }
  const last = pts[pts.length - 1];
  return {x:last.x, y:last.y};
}

function closestOnPolyline(p, pts) {
  if (pts.length < 2) {
    const q = pts[0] || {x:0, y:0};
    return {dist: Math.hypot(p.x - q.x, p.y - q.y), frac: 0};
  }

  const total = polyLen(pts) || 0.001;
  let best = {dist: Infinity, frac: 0};
  let acc = 0;

  for (let i = 0; i < pts.length - 1; i++) {
    const a = pts[i], b = pts[i + 1];
    const vx = b.x - a.x;
    const vy = b.y - a.y;
    const seg = Math.hypot(vx, vy) || 0.001;

    let u = ((p.x - a.x) * vx + (p.y - a.y) * vy) / (seg * seg);
    u = Math.max(0, Math.min(1, u));

    const qx = a.x + vx * u;
    const qy = a.y + vy * u;
    const dist = Math.hypot(p.x - qx, p.y - qy);
    const frac = (acc + seg * u) / total;

    if (dist < best.dist) best = {dist, frac};
    acc += seg;
  }

  return best;
}

const NS = 'http://www.w3.org/2000/svg';

const COLORS = [
  {body:'#1a44cc',roof:'#0e2580',stroke:'#4d7fff',ws:'rgba(150,205,255,0.55)'},
  {body:'#bb2020',roof:'#7a1010',stroke:'#ff5555',ws:'rgba(255,200,180,0.45)'},
  {body:'#cccccc',roof:'#888888',stroke:'#ffffff',ws:'rgba(200,230,255,0.55)'},
  {body:'#1a1a1a',roof:'#111111',stroke:'#555555',ws:'rgba(160,200,240,0.45)'},
];

let BASE_SPEED = 2.0;

const MINI_ROUTES = [];

(function buildMiniRoutes() {
  MINI_ROUTES.push({src: UPPER, dst: MINI_UPPER});
  MINI_ROUTES.push({src: LOWER, dst: MINI_LOWER});
  MINI_ROUTES.push({src: ENTRY, dst: MINI_ENTRY});

  VIAS.forEach((v, i) => {
    MINI_ROUTES.push({src: v, dst: MINI_VIAS[i]});
  });
})();

function mapPointToMini(x, y) {
  const p = {x, y};
  let bestRoute = MINI_ROUTES[0];
  let best = closestOnPolyline(p, bestRoute.src);

  for (let i = 1; i < MINI_ROUTES.length; i++) {
    const test = closestOnPolyline(p, MINI_ROUTES[i].src);
    if (test.dist < best.dist) {
      best = test;
      bestRoute = MINI_ROUTES[i];
    }
  }

  return pointAtFraction(bestRoute.dst, best.frac);
}

class Car {
  constructor(colorIdx, delayFrames) {
    this.color   = COLORS[colorIdx % COLORS.length];
    this.delay   = delayFrames;
    this.timer   = 0;
    this.active  = false;
    this.path    = [];
    this.segIdx  = 0;
    this.segDist = 0;
    this.x = UPPER[0].x;
    this.y = UPPER[0].y;
    this.angle = 0;
    this.el = null;
    this.miniEl = null;
    this._makeSVG();
  }

  _makeSVG() {
    const g = document.createElementNS(NS, 'g');
    g.style.display = 'none';

    const mk = (tag, a) => {
      const e = document.createElementNS(NS, tag);
      Object.entries(a).forEach(([k, v]) => e.setAttribute(k, v));
      return e;
    };

    g.appendChild(mk('ellipse', {rx:13, ry:4, cx:0, cy:7, fill:'rgba(0,0,0,0.38)'}));
    g.appendChild(mk('rect', {
      x:-13, y:-6, width:26, height:12, rx:2.5,
      fill:this.color.body, stroke:this.color.stroke, 'stroke-width':1.2
    }));
    g.appendChild(mk('rect', {x:-6, y:-5, width:13, height:10, rx:1.5, fill:this.color.roof}));
    g.appendChild(mk('rect', {x:-12, y:-5, width:7, height:10, rx:1.2, fill:this.color.ws}));
    g.appendChild(mk('circle', {cx:-12, cy:-4, r:1.5, fill:'#ffffaa'}));
    g.appendChild(mk('circle', {cx:-12, cy: 4, r:1.5, fill:'#ffffaa'}));
    g.appendChild(mk('circle', {cx:12, cy:-4, r:1.4, fill:'#aa0000'}));
    g.appendChild(mk('circle', {cx:12, cy: 4, r:1.4, fill:'#aa0000'}));
    g.setAttribute('filter', 'url(#glow)');

    document.getElementById('g-cars').appendChild(g);
    this.el = g;

    const m = document.createElementNS(NS, 'circle');
    m.setAttribute('r', '5');
    m.setAttribute('fill', this.color.body);
    m.setAttribute('stroke', '#ffffff');
    m.setAttribute('stroke-width', '1');
    m.style.display = 'none';
    document.getElementById('mini-cars').appendChild(m);
    this.miniEl = m;
  }

  _newPath() {
    const viaIdx = Math.random() < 0.25 ? -1 : Math.floor(Math.random() * 9);
    this.path = buildPath(viaIdx);
    this.segIdx = 0;
    this.segDist = 0;
  }

  update() {
    if (!this.active) {
      if (++this.timer >= this.delay) {
        this.active = true;
        this._newPath();
        this.x = this.path[0].x;
        this.y = this.path[0].y;
        this.el.style.display = '';
        this.miniEl.style.display = '';
      } else {
        return;
      }
    }

    let rem = BASE_SPEED;
    while (rem > 0) {
      if (this.segIdx >= this.path.length - 1) {
        this._newPath();
        rem = 0;
        break;
      }
      const p0 = this.path[this.segIdx];
      const p1 = this.path[this.segIdx + 1];
      const len = ptDist(p0, p1) || 0.001;
      const toEnd = len - this.segDist;

      if (rem < toEnd) {
        this.segDist += rem;
        rem = 0;
      } else {
        rem -= toEnd;
        this.segIdx++;
        this.segDist = 0;
      }
    }

    if (this.segIdx < this.path.length - 1) {
      const a = this.path[this.segIdx];
      const b = this.path[this.segIdx + 1];
      const t = Math.min(1, this.segDist / (ptDist(a, b) || 0.001));
      this.x = a.x + (b.x - a.x) * t;
      this.y = a.y + (b.y - a.y) * t;
      this.angle = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    }

    const sc = perspScale(this.y);
    this.el.setAttribute(
      'transform',
      `translate(${this.x.toFixed(1)},${this.y.toFixed(1)}) rotate(${this.angle.toFixed(1)}) scale(${sc.toFixed(3)})`
    );

    const m = mapPointToMini(this.x, this.y);
    this.miniEl.setAttribute('cx', m.x.toFixed(1));
    this.miniEl.setAttribute('cy', m.y.toFixed(1));
  }
}

const CARS = [
  new Car(0,   0),
  new Car(1, 200),
  new Car(2, 420),
  new Car(3, 640),
];

(function buildDebug() {
  const g = document.getElementById('g-debug');

  const mk = (tag, a) => {
    const e = document.createElementNS(NS, tag);
    Object.entries(a).forEach(([k, v]) => e.setAttribute(k, String(v)));
    return e;
  };

  const mkPath = (pts, color, dash) => {
    const d = pts.map((p, i) => `${i ? 'L' : 'M'} ${p.x},${p.y}`).join(' ');
    g.appendChild(mk('path', {
      d,
      fill:'none',
      stroke:color,
      'stroke-width':1.5,
      'stroke-dasharray':dash || '8 5'
    }));
  };

  mkPath(UPPER, 'rgba(0,220,255,0.7)');
  mkPath(LOWER, 'rgba(255,220,0,0.7)');
  mkPath(ENTRY, 'rgba(255,255,255,0.7)', '6 4');
  VIAS.forEach(v => mkPath(v, 'rgba(80,255,80,0.75)', '6 4'));

  VIA_ENTRY.forEach(i => {
    const p = UPPER[i];
    g.appendChild(mk('circle', {cx:p.x, cy:p.y, r:5, fill:'rgba(255,80,255,0.9)'}));
  });

  VIA_EXIT.forEach(i => {
    const p = LOWER[i];
    g.appendChild(mk('circle', {cx:p.x, cy:p.y, r:5, fill:'rgba(255,150,0,0.9)'}));
  });
})();

function loop() {
  requestAnimationFrame(loop);
  CARS.forEach(c => c.update());
}
loop();

let debugOn = false;
function toggleDebug() {
  debugOn = !debugOn;
  document.getElementById('g-debug').setAttribute('display', debugOn ? '' : 'none');
  const btn = document.getElementById('btn-debug');
  btn.textContent = `▣ ROTAS: ${debugOn ? 'ON' : 'OFF'}`;
  btn.classList.toggle('on', debugOn);
}

let speedIdx = 0;
const SPEEDS = [2.0, 4.0, 0.8];
const SLBLS  = ['⏩ NORMAL', '⏩⏩ RÁPIDO', '🐢 LENTO'];

function toggleSpeed() {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  BASE_SPEED = SPEEDS[speedIdx];
  document.getElementById('btn-speed').textContent = SLBLS[speedIdx];
}
</script>
